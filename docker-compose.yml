# EVSecSim — containerised testbed
#
# Networks
#   operator-net  172.19.0.0/24  internal, isolated — CSMS + EVSE live here
#   public-net    172.20.0.0/24  external-facing    — attackers reach CSMS here
#
# The CSMS is dual-homed (both networks).
# Attackers on public-net can only reach 172.20.0.10:9000.
# They have zero visibility into operator-net.
#
# Usage:
#   docker compose --profile normal         up   # CSMS + legitimate EVSE (baseline)
#   docker compose --profile saiflow        up   # Attack 1 — SaiFlow DoS
#   docker compose --profile fdi            up   # Attack 2 — False Data Injection
#   docker compose --profile mitm           up   # Attack 3a — MITM proxy (INTERNAL, operator-net, ARP poisoning)
#   docker compose --profile mitm-ext       up   # Attack 3b — MITM proxy (EXTERNAL, public-net, BGP/DNS hijack)
#   docker compose --profile load           up   # Attack 4 — coordinated load altering
#   docker compose --profile firmware       up   # Attack 5 — Malicious Firmware Update (INL PoC #3)
#   docker compose --profile duration-spoof up   # Attack 6 — Duration Spoofing (StopTransaction drop)
#   docker compose --profile load-grid      up   # Attack 7 — Coordinated Load Altering + PGTwin grid
#   docker compose --profile spoof-grid     up   # Attack 8 — Duration Spoofing + PGTwin grid

networks:
  operator-net:
    driver: bridge
    internal: true          # no external routing — isolated operator segment
    ipam:
      config:
        - subnet: 172.19.0.0/24

  public-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  # ── Core Infrastructure ─────────────────────────────────────────────────────
  # CSMS is dual-homed: operator-net (EVSE comms) + public-net (attacker surface)

  csms:
    build: .
    container_name: csms
    hostname: csms
    command: python core/csms_server4.py
    networks:
      operator-net:
        ipv4_address: 172.19.0.10
      public-net:
        ipv4_address: 172.20.0.10
    ports:
      - "9000:9000"         # expose to host for Wireshark / external tools
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ── Legitimate EVSE ─────────────────────────────────────────────────────────
  # Used in: normal baseline, SaiFlow (victim role)

  evse:
    build: .
    container_name: evse
    hostname: evse
    command: sh -c "sleep 2 && python core/evse_client4_fixed.py --url ws://csms:9000"
    networks:
      operator-net:
        ipv4_address: 172.19.0.20
    depends_on:
      - csms
    profiles: [normal, saiflow]

  # ── Attack 1 · SaiFlow DoS ──────────────────────────────────────────────────
  # Threat model: external attacker, public-net only, reaches CSMS:9000

  atk-saiflow:
    build: .
    container_name: atk-saiflow
    hostname: atk-saiflow
    command: sh -c "sleep 3 && python attacks/attack_saiflow_dos_patched.py --url ws://csms:9000 --duration 60"
    networks:
      public-net:
        ipv4_address: 172.20.0.30
    depends_on:
      - csms
    profiles: [saiflow]

  # ── Attack 2 · False Data Injection ─────────────────────────────────────────
  # Threat model: compromised EVSE already on operator-net (insider / supply chain)

  evse-via-fdi:
    build: .
    container_name: evse-via-fdi
    hostname: evse-via-fdi
    command: sh -c "sleep 2 && python attacks/attack_fdi.py"
    environment:
      CSMS_URL: ws://csms:9000
    networks:
      operator-net:
        ipv4_address: 172.19.0.30
    depends_on:
      - csms
    profiles: [fdi]

  # ── Attack 3a · MITM WebSocket Proxy (INTERNAL) ────────────────────────────
  # Threat model: attacker on operator-net (ARP poisoning / rogue switch) —
  #               intercepts EVSE↔CSMS traffic from within the charging LAN

  atk-mitm:
    build: .
    container_name: atk-mitm
    hostname: atk-mitm
    command: sh -c "sleep 2 && python attacks/attack_mitm_session_patched.py --csms-url ws://csms:9000 --proxy-port 9001"
    networks:
      operator-net:
        ipv4_address: 172.19.0.40
    depends_on:
      - csms
    profiles: [mitm]

  evse-via-mitm:
    build: .
    container_name: evse-via-mitm
    hostname: evse-via-mitm
    command: sh -c "sleep 4 && python core/evse_client4_fixed.py --url ws://atk-mitm:9001"
    networks:
      operator-net:
        ipv4_address: 172.19.0.50
    depends_on:
      - atk-mitm
    profiles: [mitm]

  # ── Attack 3b · MITM WebSocket Proxy (EXTERNAL) ────────────────────────────
  # Threat model: attacker on public-net (BGP hijacking / DNS poisoning /
  #               rogue cloud proxy) — intercepts EVSE WAN path to cloud CSMS.
  #               Attacker has NO access to operator-net.

  atk-mitm-ext:
    build: .
    container_name: atk-mitm-ext
    hostname: atk-mitm-ext
    command: sh -c "sleep 2 && python attacks/attack_mitm_ext.py --csms-url ws://csms:9000 --proxy-port 9002"
    networks:
      public-net:
        ipv4_address: 172.20.0.30
    depends_on:
      - csms
    profiles: [mitm-ext]

  evse-via-mitm-ext:
    build: .
    container_name: evse-via-mitm-ext
    hostname: evse-via-mitm-ext
    command: sh -c "sleep 4 && python core/evse_client4_fixed.py --url ws://atk-mitm-ext:9002"
    networks:
      public-net:
        ipv4_address: 172.20.0.50
    depends_on:
      - atk-mitm-ext
    profiles: [mitm-ext]

  # ── Attack 4 · Coordinated Load Altering ────────────────────────────────────
  # Threat model: external botnet, public-net only, reaches CSMS:9000

  atk-load:
    build: .
    container_name: atk-load
    hostname: atk-load
    command: sh -c "sleep 2 && python attacks/attack_load_altering.py --bots 10 --url ws://csms:9000"
    networks:
      public-net:
        ipv4_address: 172.20.0.40
    depends_on:
      - csms
    profiles: [load]

  # ── Attack 5 · Malicious Firmware Update ────────────────────────────────────
  # Threat model: rogue CSMS on operator-net — EVSE connects to attacker instead
  #               of the real CSMS (models DNS poisoning / compromised CSMS).
  #               OCPP 1.6 has no firmware signature; EVSE installs any payload.
  # NOTE: no real CSMS is started in this profile — atk-firmware IS the CSMS.

  atk-firmware:
    build: .
    container_name: atk-firmware
    hostname: atk-firmware
    command: sh -c "sleep 1 && python attacks/attack_firmware.py --firmware-host atk-firmware --push-delay 10"
    environment:
      CSMS_PORT: 9000
      PAYLOAD_PORT: 8080
    networks:
      operator-net:
        ipv4_address: 172.19.0.30
    ports:
      - "9000:9000"   # EVSE connects here (rogue CSMS)
      - "8080:8080"   # Payload visible on host for Wireshark / browser demo
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles: [firmware]

  evse-via-firmware:
    build: .
    container_name: evse-via-firmware
    hostname: evse-via-firmware
    command: sh -c "sleep 3 && python core/evse_client4_fixed.py --url ws://atk-firmware:9000"
    networks:
      operator-net:
        ipv4_address: 172.19.0.60
    depends_on:
      - atk-firmware
    profiles: [firmware]

  # ── Attack 6 · Duration Spoofing ───────────────────────────────────────────
  # Threat model: attacker on operator-net (ARP poisoning / rogue switch) —
  #               drops the EVSE's StopTransaction so the CSMS never learns
  #               the session ended; injects phantom MeterValues sustaining
  #               60 kW ghost load in PGTwin for GHOST_DURATION_S seconds.
  # This is the OPPOSITE of premature termination (Attack 3a).

  atk-duration-spoof:
    build: .
    container_name: atk-duration-spoof
    hostname: atk-duration-spoof
    command: sh -c "sleep 2 && python attacks/attack_duration_spoof.py --csms-url ws://csms:9000 --proxy-port 9003 --ghost-duration 50 --meter-interval 10"
    networks:
      operator-net:
        ipv4_address: 172.19.0.41
    depends_on:
      - csms
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles: [duration-spoof]

  evse-via-duration-spoof:
    build: .
    container_name: evse-via-duration-spoof
    hostname: evse-via-duration-spoof
    command: sh -c "sleep 4 && python core/evse_client4_fixed.py --url ws://atk-duration-spoof:9003 --session-duration 20"
    networks:
      operator-net:
        ipv4_address: 172.19.0.61
    depends_on:
      - atk-duration-spoof
    profiles: [duration-spoof]

  # ── PGTwin Grid Simulator ────────────────────────────────────────────────────
  # Shared by Attack 7 and Attack 8.  Reads /shared/ev_load_kw.txt before every
  # runpp() and writes SimOutput*.csv to the same shared volume.

  pgtwin:
    build: .
    container_name: pgtwin
    hostname: pgtwin
    command: python grid/ZSGplussync_docker.py
    environment:
      CSV_DIR: /shared
    volumes:
      - pgtwin-shared:/shared
    networks:
      operator-net:
        ipv4_address: 172.19.0.70
    profiles: [load-grid, spoof-grid]

  # ── Attack 7 · Coordinated Load Altering + PGTwin ───────────────────────────
  # Threat model: external botnet, public-net only (same as Attack 4).
  # Writes aggregated EV kW to shared volume; pgtwin injects it at Bus 44.

  atk-load-grid:
    build: .
    container_name: atk-load-grid
    hostname: atk-load-grid
    command: sh -c "sleep 3 && python attacks/attack_load_grid.py"
    environment:
      CSMS_URL: ws://csms:9000
      EV_LOAD_FILE: /shared/ev_load_kw.txt
    volumes:
      - pgtwin-shared:/shared
    networks:
      public-net:
        ipv4_address: 172.20.0.41
    depends_on:
      - csms
      - pgtwin
    profiles: [load-grid]

  # ── Attack 8 · Duration Spoofing + PGTwin ───────────────────────────────────
  # Threat model: attacker on operator-net (ARP poisoning / rogue switch).
  # Proxy intercepts StopTransaction; ghost phase holds ev_load_kw.txt at
  # PHANTOM_KW so pgtwin shows Bus 44 depressed after the EVSE disconnects.

  atk-spoof-grid:
    build: .
    container_name: atk-spoof-grid
    hostname: atk-spoof-grid
    command: sh -c "sleep 2 && python attacks/attack_spoof_grid.py"
    environment:
      CSMS_URL: ws://csms:9000
      EV_LOAD_FILE: /shared/ev_load_kw.txt
    volumes:
      - pgtwin-shared:/shared
    networks:
      operator-net:
        ipv4_address: 172.19.0.42
    depends_on:
      - csms
      - pgtwin
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles: [spoof-grid]

  evse-via-spoof-grid:
    build: .
    container_name: evse-via-spoof-grid
    hostname: evse-via-spoof-grid
    command: sh -c "sleep 4 && python core/evse_client4_fixed.py --url ws://atk-spoof-grid:9004 --session-duration 20"
    networks:
      operator-net:
        ipv4_address: 172.19.0.62
    depends_on:
      - atk-spoof-grid
    profiles: [spoof-grid]

volumes:
  pgtwin-shared:
