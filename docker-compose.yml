# EVSecSim — containerised testbed
#
# Networks
#   operator-net  172.19.0.0/24  internal, isolated — CSMS + EVSE live here
#   public-net    172.20.0.0/24  external-facing    — attackers reach CSMS here
#
# The CSMS is dual-homed (both networks).
# Attackers on public-net can only reach 172.20.0.10:9000.
# They have zero visibility into operator-net.
#
# Usage:
#   docker compose --profile normal         up   # CSMS + legitimate EVSE (baseline)
#   docker compose --profile saiflow        up   # Attack 1 — SaiFlow DoS
#   docker compose --profile fdi            up   # Attack 2 — False Data Injection
#   docker compose --profile mitm           up   # Attack 3a — MITM proxy (INTERNAL, operator-net, ARP poisoning)
#   docker compose --profile mitm-ext       up   # Attack 3b — MITM proxy (EXTERNAL, public-net, BGP/DNS hijack)
#   docker compose --profile load           up   # Attack 4 — coordinated load altering
#   docker compose --profile firmware       up   # Attack 5 — Malicious Firmware Update (INL PoC #3)
#   docker compose --profile duration-spoof up   # Attack 6 — Duration Spoofing (StopTransaction drop)
#   docker compose --profile overload-grid  up   # Attack 7 — Single EVSE Grid Overload + PGTwin intro
#   docker compose --profile load-grid      up   # Attack 8 — Coordinated Load Altering + PGTwin grid
#   docker compose --profile spoof-grid     up   # Attack 9 — Duration Spoofing + PGTwin grid
#
#   ── OCPP 2.0.1 SURVIVAL track (plaintext / Profile-1 equivalent, port 9100) ──
#   Data-integrity attacks survive the 1.6 -> 2.0.1 message-model migration.
#   docker compose --profile v201-normal         up   # 2.0.1 CSMS + legitimate 2.0.1 EVSE (baseline)
#   docker compose --profile v201-fdi            up   # 2.0.1 False Data Injection (survives 2.0.1)
#   docker compose --profile v201-overload-grid  up   # 2.0.1 Single EVSE Overload + PGTwin grid
#
#   ── OCPP 2.0.1 PREVENTION track (Security Profile 3 mutual-TLS + signed firmware, port 9101) ──
#   Attacks that 2.0.1's security profile blocks — shown FAILING.
#   docker compose --profile v201-secure-normal   up   # secure CSMS + EVSE (mutual-TLS baseline)
#   docker compose --profile v201-secure-mitm     up   # MITM (3a/3b/6) blocked by TLS cert validation
#   docker compose --profile v201-secure-firmware up   # firmware RCE (5) blocked by signed firmware

networks:
  operator-net:
    driver: bridge
    internal: true          # no external routing — isolated operator segment
    ipam:
      config:
        - subnet: 172.19.0.0/24

  public-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  # ── Core Infrastructure ─────────────────────────────────────────────────────
  # CSMS is dual-homed: operator-net (EVSE comms) + public-net (attacker surface)

  csms:
    build: .
    container_name: csms
    hostname: csms
    command: python core/csms_server4.py
    networks:
      operator-net:
        ipv4_address: 172.19.0.10
      public-net:
        ipv4_address: 172.20.0.10
    ports:
      - "9000:9000"         # expose to host for Wireshark / external tools
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ── Legitimate EVSE ─────────────────────────────────────────────────────────
  # Used in: normal baseline, SaiFlow (victim role)

  evse:
    build: .
    container_name: evse
    hostname: evse
    command: sh -c "sleep 2 && python core/evse_client4_fixed.py --url ws://csms:9000"
    networks:
      operator-net:
        ipv4_address: 172.19.0.20
    depends_on:
      - csms
    profiles: [normal, saiflow]

  # ── Attack 1 · SaiFlow DoS ──────────────────────────────────────────────────
  # Threat model: external attacker, public-net only, reaches CSMS:9000

  atk-saiflow:
    build: .
    container_name: atk-saiflow
    hostname: atk-saiflow
    command: sh -c "sleep 3 && python attacks/attack_saiflow_dos_patched.py --url ws://csms:9000 --duration 60"
    networks:
      public-net:
        ipv4_address: 172.20.0.30
    depends_on:
      - csms
    profiles: [saiflow]

  # ── Attack 2 · False Data Injection ─────────────────────────────────────────
  # Threat model: compromised EVSE already on operator-net (insider / supply chain)

  evse-via-fdi:
    build: .
    container_name: evse-via-fdi
    hostname: evse-via-fdi
    command: sh -c "sleep 2 && python attacks/attack_fdi.py"
    environment:
      CSMS_URL: ws://csms:9000
    networks:
      operator-net:
        ipv4_address: 172.19.0.30
    depends_on:
      - csms
    profiles: [fdi]

  # ── Attack 3a · MITM WebSocket Proxy (INTERNAL) ────────────────────────────
  # Threat model: attacker on operator-net (ARP poisoning / rogue switch) —
  #               intercepts EVSE↔CSMS traffic from within the charging LAN

  atk-mitm:
    build: .
    container_name: atk-mitm
    hostname: atk-mitm
    command: sh -c "sleep 2 && python attacks/attack_mitm_session_patched.py --csms-url ws://csms:9000 --proxy-port 9001"
    networks:
      operator-net:
        ipv4_address: 172.19.0.40
    depends_on:
      - csms
    profiles: [mitm]

  evse-via-mitm:
    build: .
    container_name: evse-via-mitm
    hostname: evse-via-mitm
    command: sh -c "sleep 4 && python core/evse_client4_fixed.py --url ws://atk-mitm:9001"
    networks:
      operator-net:
        ipv4_address: 172.19.0.50
    depends_on:
      - atk-mitm
    profiles: [mitm]

  # ── Attack 3b · MITM WebSocket Proxy (EXTERNAL) ────────────────────────────
  # Threat model: attacker on public-net (BGP hijacking / DNS poisoning /
  #               rogue cloud proxy) — intercepts EVSE WAN path to cloud CSMS.
  #               Attacker has NO access to operator-net.

  atk-mitm-ext:
    build: .
    container_name: atk-mitm-ext
    hostname: atk-mitm-ext
    command: sh -c "sleep 2 && python attacks/attack_mitm_ext.py --csms-url ws://csms:9000 --proxy-port 9002"
    networks:
      public-net:
        ipv4_address: 172.20.0.30
    depends_on:
      - csms
    profiles: [mitm-ext]

  evse-via-mitm-ext:
    build: .
    container_name: evse-via-mitm-ext
    hostname: evse-via-mitm-ext
    command: sh -c "sleep 4 && python core/evse_client4_fixed.py --url ws://atk-mitm-ext:9002"
    networks:
      public-net:
        ipv4_address: 172.20.0.50
    depends_on:
      - atk-mitm-ext
    profiles: [mitm-ext]

  # ── Attack 3b-DNS · EXTERNAL MITM with a real interception primitive ───────
  # The rigorous version of Attack 3b.  The EVSE is configured with the REAL
  # CSMS hostname (csms.cpo.sg) — NOT the attacker's address.  A poisoned DNS
  # resolver returns the attacker's IP for that hostname, so the EVSE dials the
  # MITM proxy believing it reached the cloud CSMS.  The interception is now
  # caused by name resolution, not by the victim's own config.
  #
  #   docker compose --profile mitm-ext-dns      up --build --force-recreate
  #   docker compose --profile mitm-ext-dns-safe up --build --force-recreate   (benign control)

  dns-poison:
    build: .
    container_name: dns-poison
    hostname: dns-poison
    command: python attacks/dns_poison.py
    environment:
      TARGET_HOST: csms.cpo.sg
      ANSWER_IP: 172.20.0.33          # attacker MITM proxy
      MODE: POISON
    networks:
      public-net:
        ipv4_address: 172.20.0.5
    profiles: [mitm-ext-dns]

  atk-mitm-ext-dns:
    build: .
    container_name: atk-mitm-ext-dns
    hostname: atk-mitm-ext-dns
    # listens on :9000 so csms.cpo.sg:9000 (the real CSMS port) lands here
    command: sh -c "sleep 2 && python attacks/attack_mitm_ext.py --csms-url ws://csms:9000 --proxy-port 9000"
    networks:
      public-net:
        ipv4_address: 172.20.0.33
    depends_on:
      - csms
    profiles: [mitm-ext-dns]

  evse-via-dns:
    build: .
    container_name: evse-via-dns
    hostname: evse-via-dns
    # NOTE: identical to the benign command below — points at the REAL hostname.
    command: sh -c "sleep 6 && python core/evse_client4_fixed.py --url ws://csms.cpo.sg:9000"
    dns:
      - 172.20.0.5                    # poisoned resolver
    networks:
      public-net:
        ipv4_address: 172.20.0.55
    depends_on:
      - dns-poison
      - atk-mitm-ext-dns
    profiles: [mitm-ext-dns]

  # Benign control: SAME EVSE command, but an honest resolver returns the real
  # CSMS IP — demonstrating that only the DNS answer changed between runs.
  dns-honest:
    build: .
    container_name: dns-honest
    hostname: dns-honest
    command: python attacks/dns_poison.py
    environment:
      TARGET_HOST: csms.cpo.sg
      ANSWER_IP: 172.20.0.10          # real CSMS (public-net)
      MODE: HONEST
    networks:
      public-net:
        ipv4_address: 172.20.0.6
    profiles: [mitm-ext-dns-safe]

  evse-via-dns-safe:
    build: .
    container_name: evse-via-dns-safe
    hostname: evse-via-dns-safe
    command: sh -c "sleep 6 && python core/evse_client4_fixed.py --url ws://csms.cpo.sg:9000"
    dns:
      - 172.20.0.6                    # honest resolver
    networks:
      public-net:
        ipv4_address: 172.20.0.56
    depends_on:
      - dns-honest
      - csms
    profiles: [mitm-ext-dns-safe]

  # ── Attack 4 · Coordinated Load Altering ────────────────────────────────────
  # Threat model: external botnet, public-net only, reaches CSMS:9000

  atk-load:
    build: .
    container_name: atk-load
    hostname: atk-load
    command: sh -c "sleep 2 && python attacks/attack_load_altering.py --bots 10 --url ws://csms:9000"
    networks:
      public-net:
        ipv4_address: 172.20.0.40
    depends_on:
      - csms
    profiles: [load]

  # ── Attack 5 · Malicious Firmware Update ────────────────────────────────────
  # Threat model: rogue CSMS on operator-net — EVSE connects to attacker instead
  #               of the real CSMS (models DNS poisoning / compromised CSMS).
  #               OCPP 1.6 has no firmware signature; EVSE installs any payload.
  # NOTE: no real CSMS is started in this profile — atk-firmware IS the CSMS.

  atk-firmware:
    build: .
    container_name: atk-firmware
    hostname: atk-firmware
    command: sh -c "sleep 1 && python attacks/attack_firmware.py --firmware-host atk-firmware --push-delay 10"
    environment:
      CSMS_PORT: 9000
      PAYLOAD_PORT: 8080
    networks:
      operator-net:
        ipv4_address: 172.19.0.30
    ports:
      - "9000:9000"   # EVSE connects here (rogue CSMS)
      - "8080:8080"   # Payload visible on host for Wireshark / browser demo
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles: [firmware]

  evse-via-firmware:
    build: .
    container_name: evse-via-firmware
    hostname: evse-via-firmware
    command: sh -c "sleep 3 && python core/evse_client4_fixed.py --url ws://atk-firmware:9000"
    networks:
      operator-net:
        ipv4_address: 172.19.0.60
    depends_on:
      - atk-firmware
    profiles: [firmware]

  # ── Attack 6 · Duration Spoofing ───────────────────────────────────────────
  # Threat model: attacker on operator-net (ARP poisoning / rogue switch) —
  #               drops the EVSE's StopTransaction so the CSMS never learns
  #               the session ended; injects phantom MeterValues sustaining
  #               60 kW ghost load in PGTwin for GHOST_DURATION_S seconds.
  # This is the OPPOSITE of premature termination (Attack 3a).

  atk-duration-spoof:
    build: .
    container_name: atk-duration-spoof
    hostname: atk-duration-spoof
    command: sh -c "sleep 2 && python attacks/attack_duration_spoof.py --csms-url ws://csms:9000 --proxy-port 9003 --ghost-duration 50 --meter-interval 10"
    networks:
      operator-net:
        ipv4_address: 172.19.0.41
    depends_on:
      - csms
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles: [duration-spoof]

  evse-via-duration-spoof:
    build: .
    container_name: evse-via-duration-spoof
    hostname: evse-via-duration-spoof
    command: sh -c "sleep 4 && python core/evse_client4_fixed.py --url ws://atk-duration-spoof:9003 --session-duration 20"
    networks:
      operator-net:
        ipv4_address: 172.19.0.61
    depends_on:
      - atk-duration-spoof
    profiles: [duration-spoof]

  # ── PGTwin Grid Simulator ────────────────────────────────────────────────────
  # Shared by Attack 7 and Attack 8.  Reads /shared/ev_load_kw.txt before every
  # runpp() and writes SimOutput*.csv to the same shared volume.

  pgtwin:
    build: .
    container_name: pgtwin
    hostname: pgtwin
    command: python grid/ZSGplussync_docker.py
    environment:
      CSV_DIR: /shared
    volumes:
      - pgtwin-shared:/shared
    networks:
      operator-net:
        ipv4_address: 172.19.0.70
    profiles: [overload-grid, load-grid, spoof-grid, v201-overload-grid]

  # ── Attack 10 · Coordinated Fleet Overload @ realistic MV hub ──────────────
  # Same PGTwin model, but EV load is injected at Load1 / Bus 21 (6.6 kV
  # industrial, 1.0 MW baseline) — where a real charging hub connects — instead
  # of the 0.4 kV small-industry Bus 44.  A scaled DC-fast botnet drives the
  # aggregate load past the feeder's thermal limit (line loading >= 100%),
  # the realistic failure mode at MV (voltage barely moves).
  #
  #   docker compose --profile overload-fleet up --build --force-recreate
  #
  # For the LV worst-case bookend and the full ramp-to-failure thresholds + figure:
  #   python attacks/grid_ramp_analysis.py

  pgtwin-mv:
    build: .
    container_name: pgtwin-mv
    hostname: pgtwin-mv
    command: python grid/ZSGplussync_docker.py
    environment:
      CSV_DIR: /shared
      EV_LOAD_IDX: "0"                 # Load1 (Bus 21, 6.6 kV MV hub)
      EV_LOAD_BASELINE_MW: "1.0"       # Load1 original p_mw
    volumes:
      - pgtwin-shared:/shared
    networks:
      operator-net:
        ipv4_address: 172.19.0.71
    profiles: [overload-fleet]

  atk-overload-fleet:
    build: .
    container_name: atk-overload-fleet
    hostname: atk-overload-fleet
    # reuses the Attack 8 botnet engine at realistic fleet scale:
    # 20 HPC DC-fast chargers x 300 kW = 6.0 MW aggregate (crosses the 5.55 MW
    # MV feeder-overload threshold measured by grid_ramp_analysis.py)
    command: sh -c "sleep 3 && python attacks/attack_load_grid.py --bots 20 --kw 300 --url ws://csms:9000"
    environment:
      EV_LOAD_FILE: /shared/ev_load_kw.txt
    volumes:
      - pgtwin-shared:/shared
    networks:
      public-net:
        ipv4_address: 172.20.0.43
    depends_on:
      - csms
      - pgtwin-mv
    profiles: [overload-fleet]

  # ── Attack 7 · Single EVSE Grid Overload + PGTwin ──────────────────────────
  # Threat model: single rogue EVSE on public-net reports inflated MeterValues.
  # Steps from 0 → 11 → 22 → 44 → 66 kW, each held for STEP_DURATION_S seconds.
  # Produces a monotonic Bus 44 voltage sag — introductory PGTwin demonstration.

  atk-overload-grid:
    build: .
    container_name: atk-overload-grid
    hostname: atk-overload-grid
    command: sh -c "sleep 3 && python attacks/attack_overload_grid.py"
    environment:
      CSMS_URL: ws://csms:9000
      EV_LOAD_FILE: /shared/ev_load_kw.txt
    volumes:
      - pgtwin-shared:/shared
    networks:
      public-net:
        ipv4_address: 172.20.0.42
    depends_on:
      - csms
      - pgtwin
    profiles: [overload-grid]

  # ── Attack 8 · Coordinated Load Altering + PGTwin ───────────────────────────
  # Threat model: external botnet, public-net only (same as Attack 4).
  # Writes aggregated EV kW to shared volume; pgtwin injects it at Bus 44.

  atk-load-grid:
    build: .
    container_name: atk-load-grid
    hostname: atk-load-grid
    command: sh -c "sleep 3 && python attacks/attack_load_grid.py"
    environment:
      CSMS_URL: ws://csms:9000
      EV_LOAD_FILE: /shared/ev_load_kw.txt
    volumes:
      - pgtwin-shared:/shared
    networks:
      public-net:
        ipv4_address: 172.20.0.41
    depends_on:
      - csms
      - pgtwin
    profiles: [load-grid]

  # ── Attack 8 · Duration Spoofing + PGTwin ───────────────────────────────────
  # Threat model: attacker on operator-net (ARP poisoning / rogue switch).
  # Proxy intercepts StopTransaction; ghost phase holds ev_load_kw.txt at
  # PHANTOM_KW so pgtwin shows Bus 44 depressed after the EVSE disconnects.

  atk-spoof-grid:
    build: .
    container_name: atk-spoof-grid
    hostname: atk-spoof-grid
    command: sh -c "sleep 2 && python attacks/attack_spoof_grid.py"
    environment:
      CSMS_URL: ws://csms:9000
      EV_LOAD_FILE: /shared/ev_load_kw.txt
    volumes:
      - pgtwin-shared:/shared
    networks:
      operator-net:
        ipv4_address: 172.19.0.42
    depends_on:
      - csms
      - pgtwin
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles: [spoof-grid]

  evse-via-spoof-grid:
    build: .
    container_name: evse-via-spoof-grid
    hostname: evse-via-spoof-grid
    command: sh -c "sleep 4 && python core/evse_client4_fixed.py --url ws://atk-spoof-grid:9004 --session-duration 20"
    networks:
      operator-net:
        ipv4_address: 172.19.0.62
    depends_on:
      - atk-spoof-grid
    profiles: [spoof-grid]

  # ══════════════════════════════════════════════════════════════════════════
  # OCPP 2.0.1 TRACK  (separate CSMS on port 9100)
  #
  # Plaintext ws:// / Profile-1 equivalent — deliberately NOT TLS. This track
  # isolates ONE variable: the message model (TransactionEvent vs 1.6's
  # StartTransaction/MeterValues/StopTransaction). It demonstrates that the
  # data-integrity attack class (FDI, overload) survives the 1.6 → 2.0.1
  # migration. MITM/firmware are excluded — they are defeated by the security
  # profile (TLS/signing), not the protocol version (a TLS track is deferred).
  # ══════════════════════════════════════════════════════════════════════════

  # ── OCPP 2.0.1 CSMS ─────────────────────────────────────────────────────────
  # Dual-homed like the 1.6 CSMS; listens on 9100.

  csms-v201:
    build: .
    container_name: csms-v201
    hostname: csms-v201
    command: python v201/core/csms_server_v201.py
    environment:
      CSMS_PORT: 9100
    networks:
      operator-net:
        ipv4_address: 172.19.0.100
      public-net:
        ipv4_address: 172.20.0.100
    ports:
      - "9100:9100"
    profiles: [v201-normal, v201-fdi, v201-overload-grid]

  # ── 2.0.1 legitimate EVSE (baseline) ────────────────────────────────────────

  evse-v201:
    build: .
    container_name: evse-v201
    hostname: evse-v201
    command: sh -c "sleep 3 && python v201/core/evse_client_v201.py --url ws://csms-v201:9100 --duration 30"
    environment:
      CSMS_URL: ws://csms-v201:9100
    networks:
      operator-net:
        ipv4_address: 172.19.0.101
    depends_on:
      - csms-v201
    profiles: [v201-normal]

  # ── 2.0.1 Attack · False Data Injection ─────────────────────────────────────
  # Threat model: compromised-but-authenticated charger (insider) on operator-net.

  atk-fdi-v201:
    build: .
    container_name: atk-fdi-v201
    hostname: atk-fdi-v201
    command: sh -c "sleep 3 && python v201/attacks/attack_fdi_v201.py"
    environment:
      CSMS_URL: ws://csms-v201:9100
    networks:
      operator-net:
        ipv4_address: 172.19.0.102
    depends_on:
      - csms-v201
    profiles: [v201-fdi]

  # ── 2.0.1 Attack · Single EVSE Grid Overload + PGTwin ───────────────────────
  # Threat model: single rogue EVSE on public-net. Reuses the pgtwin shared
  # volume — grid impact is identical to the 1.6 version (grid reads a float).

  atk-overload-v201:
    build: .
    container_name: atk-overload-v201
    hostname: atk-overload-v201
    command: sh -c "sleep 3 && python v201/attacks/attack_overload_v201.py"
    environment:
      CSMS_URL: ws://csms-v201:9100
      EV_LOAD_FILE: /shared/ev_load_kw.txt
    volumes:
      - pgtwin-shared:/shared
    networks:
      public-net:
        ipv4_address: 172.20.0.101
    depends_on:
      - csms-v201
      - pgtwin
    profiles: [v201-overload-grid]

  # ══════════════════════════════════════════════════════════════════════════
  # OCPP 2.0.1 PREVENTION TRACK  (Security Profile 3: mutual TLS + signed firmware)
  #
  # Demonstrates the attacks 2.0.1's SECURITY PROFILE blocks — shown failing.
  # The block is achieved by TLS + cert validation + firmware signing (the
  # profile), NOT by the OCPP version number. Honest claim: "under Profile 3,
  # correctly deployed, these attacks are prevented" — side-by-side with the
  # plaintext track where the same attacks succeed.
  #
  # PKI is baked into the image (/certs) by gen_certs.py at build time.
  # Secure CSMS listens on wss:// 9101 and requires a valid client certificate.
  # ══════════════════════════════════════════════════════════════════════════

  # ── Secure CSMS (legit) — used by the normal + MITM profiles ────────────────
  csms-secure-v201:
    build: .
    container_name: csms-secure-v201
    hostname: csms-secure-v201
    command: python v201/secure/csms_secure_v201.py
    environment:
      CSMS_PORT: 9101
    networks:
      operator-net:
        ipv4_address: 172.19.0.110
        aliases: [csms-secure-v201]
    ports:
      - "9101:9101"
    profiles: [v201-secure-normal, v201-secure-mitm]

  # ── Secure CSMS (compromised) — firmware profile; same network alias ────────
  csms-secure-v201-fw:
    build: .
    container_name: csms-secure-v201-fw
    hostname: csms-secure-v201
    command: python v201/secure/csms_secure_v201.py
    environment:
      CSMS_PORT: 9101
      FIRMWARE_ATTACK: "1"
      ROGUE_FW_URL: http://atk-firmware-secure:8090/firmware.bin
    networks:
      operator-net:
        ipv4_address: 172.19.0.111
        aliases: [csms-secure-v201]
    depends_on:
      - atk-firmware-secure
    profiles: [v201-secure-firmware]

  # ── Secure EVSE — baseline (mutual-TLS handshake succeeds) ───────────────────
  evse-secure-v201:
    build: .
    container_name: evse-secure-v201
    hostname: evse-secure-v201
    command: sh -c "sleep 3 && python v201/secure/evse_secure_v201.py --url wss://csms-secure-v201:9101 --duration 25"
    networks:
      operator-net:
